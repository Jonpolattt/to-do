<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- css link -->
    <link rel="stylesheet" href="./assets/css/style.css">
    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+IE:wght@100..400&display=swap" rel="stylesheet">
    <title>To - Do</title>
</head>

<body>
    <div class="wrapper">
        <main>
            <div class="container">

                <div class="header">
                    <h1>Your To-do</h1>

                    <button class="dark-btn" type="button">dark</button>
                </div>

                <div class="input-box">
                    <input type="text" placeholder="Your To DO" class="input">
                    <button type="button" class="add">Add</button>
                </div>

                <div class="todo-list">
                    <div class="todo-item">
                        <input type="checkbox">
                        <span>Review project documentation</span>
                        <button type="button" class="delete"></button>
                    </div>

                </div>
            </div>
        </main>

        <!-- footer -->
        <footer class="d-flex">
            <p>Contact Us</p>

            <div class="icons">
                <span>
                    <a href="https://www.instagram.com/ravshanovv.jonpolat/">
                       instagram
                    </a>

                </span>
                <span><a href="https://t.me/ravshanovv_jonpolat">
                      t.me/ravshanovv_jonpolat
                    </a>
                </span>
                <span>
                    <a href="https://github.com/Jonpolattt">
                      git
                    </a>
                </span>
            </div>

            <p class="me">
                Powered by
                <a href="https://github.com/Jonpolattt">
                    Jonpo'lat
                </a>
            </p>

        </footer>
    </div>


    <!-- script js -->
    <script src="./assets/js/script.js"></script>
</body>

</html>
