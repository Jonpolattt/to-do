<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- css link -->
    <link rel="stylesheet" href="./assets/css/style.css">
    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+IE:wght@100..400&display=swap" rel="stylesheet">
    <title>To - Do</title>
</head>

<body>
    <div class="wrapper">
        <main>
            <div class="container">

                <div class="header">
                    <h1>Your To-do</h1>

                    <button class="dark-btn" type="button">

                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-sun w-5 h-5">
                            <circle cx="12" cy="12" r="4"></circle>
                            <path d="M12 2v2"></path>
                            <path d="M12 20v2"></path>
                            <path d="m4.93 4.93 1.41 1.41"></path>
                            <path d="m17.66 17.66 1.41 1.41"></path>
                            <path d="M2 12h2"></path>
                            <path d="M20 12h2"></path>
                            <path d="m6.34 17.66-1.41 1.41"></path>
                            <path d="m19.07 4.93-1.41 1.41"></path>
                        </svg>
                    </button>
                </div>

                <div class="input-box">
                    <input type="text" placeholder="Your To DO" class="input">
                    <button type="button" class="add">Add</button>
                </div>

                <div class="todo-list">

                    <div class="todo-item">
                        <input type="checkbox">
                        <span>Review project documentation</span>
                        <button type="button" class="delete"></button>
                    </div>

                    <!-- <div class="todo-item completed">
                        <input type="checkbox" checked>
                        <span>Update website design</span>
                    </div>

                    <div class="todo-item completed">
                        <input type="checkbox" checked>
                        <span>Call team meeting</span>
                    </div> -->

                </div>
            </div>
        </main>

        <!-- footer -->
        <footer class="d-flex">
            <p>Contact Us</p>

            <div class="icons">
                <span>
                    <a href="https://www.instagram.com/ravshanovv.jonpolat/">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-instagram w-4 h-4">
                            <rect width="20" height="20" x="2" y="2" rx="5" ry="5"></rect>
                            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                            <line x1="17.5" x2="17.51" y1="6.5" y2="6.5"></line>

                            <path d="M22 2 11 13"></path>
                            <path d="M22 2 15 22 11 13 2 9 22 2Z"></path>

                        </svg>

                    <a href="https://github.com/Jonpolattt">

                            class="lucide lucide-github w-4 h-4">

                            <path
